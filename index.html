<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MKT Planner — Valor Pyme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F3F5F9;
      --surface: #FFFFFF;
      --border: #E4E8F0;
      --text: #111827;
      --text-muted: #6B7280;
      --accent: #2563EB;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
      --shadow: 0 4px 16px rgba(0,0,0,.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ─── TOPBAR ─────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      padding: 0 20px;
      background: white;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-logo {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #1A237E 0%, #0051A5 50%, #7B2FBE 100%);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 800; font-size: 13px; letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    .brand-text strong { font-size: 14px; font-weight: 700; display: block; line-height: 1.1; }
    .brand-text span { font-size: 11px; color: var(--text-muted); }
    .topbar-center { display: flex; align-items: center; gap: 10px; flex: 1; justify-content: center; }
    .period-title { font-size: 15px; font-weight: 600; min-width: 200px; text-align: center; }
    .nav-btn {
      width: 30px; height: 30px; border: 1.5px solid var(--border);
      background: white; border-radius: 8px; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; color: var(--text);
    }
    .nav-btn:hover { background: var(--bg); border-color: #aaa; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .view-toggle {
      display: flex; background: var(--bg); border-radius: 8px; padding: 3px; gap: 2px;
    }
    .view-btn {
      padding: 5px 12px; border: none; border-radius: 6px; background: transparent;
      cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text-muted);
      transition: all .15s; font-family: inherit;
    }
    .view-btn.active { background: white; color: var(--text); box-shadow: var(--shadow-sm); }
    .add-btn {
      padding: 7px 14px; background: var(--accent); color: white; border: none;
      border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600;
      transition: opacity .15s; font-family: inherit; white-space: nowrap;
    }
    .add-btn:hover { opacity: .85; }

    /* ─── FILTER BAR ─────────────────── */
    .filter-bar {
      display: flex; align-items: center; gap: 5px;
      padding: 7px 20px; background: white; border-bottom: 1px solid var(--border);
      overflow-x: auto; flex-shrink: 0;
    }
    .filter-bar::-webkit-scrollbar { height: 0; }
    .filter-label {
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; margin-right: 2px;
    }
    .filter-pill {
      padding: 3px 11px; border-radius: 100px; border: 1.5px solid;
      background: transparent; cursor: pointer; font-size: 11px; font-weight: 500;
      white-space: nowrap; transition: all .15s; font-family: inherit; flex-shrink: 0;
    }
    .filter-pill:hover { opacity: .8; }
    .filter-pill.active { color: white !important; }
    .filter-sep { width: 1px; height: 18px; background: var(--border); margin: 0 3px; flex-shrink: 0; }

    /* ─── MAIN LAYOUT ────────────────── */
    .main-layout { display: flex; flex: 1; overflow: hidden; }
    .calendar-area { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .calendar-area::-webkit-scrollbar { width: 5px; }
    .calendar-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

    /* ─── WEEKLY VIEW ────────────────── */
    .week-summary {
      display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap;
    }
    .week-summary-label { font-size: 11px; color: var(--text-muted); }
    .wsc {
      display: flex; align-items: center; gap: 4px; padding: 3px 9px;
      border-radius: 100px; font-size: 11px; font-weight: 600;
      background: var(--p-bg, #f0f0f0); color: var(--p-color, #666);
    }
    .wsc-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--p-color, #ccc); }

    /* Plan marks strip */
    .plan-bar {
      display: flex; align-items: center; gap: 5px; margin-bottom: 14px; flex-wrap: wrap;
      padding: 6px 10px; background: #F8F9FB; border-radius: 8px;
      border: 1px dashed var(--border);
    }
    .plan-bar-label {
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; margin-right: 2px;
    }
    .plan-chip {
      display: flex; align-items: center; gap: 3px; padding: 2px 8px;
      border-radius: 100px; font-size: 10px; font-weight: 600;
      color: var(--p-color); border: 1.5px dashed var(--p-color);
      background: var(--p-bg); opacity: .75;
    }
    .plan-chip-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--p-color); opacity: .6; }

    /* Month pill plan variant */
    .month-pill-plan {
      opacity: .5; border-left-style: dashed; font-size: 9px; padding: 1px 4px;
    }

    .week-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; align-items: start; }
    .day-col { display: flex; flex-direction: column; gap: 6px; }
    .day-header {
      text-align: center; padding: 8px 4px 7px;
      border-bottom: 2px solid var(--border); margin-bottom: 2px;
    }
    .day-name {
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .07em;
    }
    .day-num-wrap {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 50%; margin: 3px auto;
    }
    .day-num-wrap.today { background: var(--accent); }
    .day-num { font-size: 17px; font-weight: 700; color: var(--text); }
    .day-num-wrap.today .day-num { color: white; }

    .event-card {
      background: var(--p-bg, #f5f5f5); border-left: 3px solid var(--p-color, #ccc);
      border-radius: 8px; padding: 8px 10px; cursor: pointer;
      transition: transform .12s, box-shadow .12s; position: relative;
    }
    .event-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
    .event-card.selected { outline: 2px solid var(--p-color, #ccc); outline-offset: 1px; }
    .ec-partner { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
    .ec-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--p-color, #ccc); flex-shrink: 0; }
    .ec-partner-name { font-size: 10px; font-weight: 700; color: var(--p-color, #999); text-transform: uppercase; letter-spacing: .04em; }
    .ec-type { font-size: 9px; background: rgba(0,0,0,.07); border-radius: 4px; padding: 1px 5px; margin-left: auto; color: var(--text-muted); white-space: nowrap; }
    .ec-title { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.3; }

    .day-add-btn {
      width: 100%; padding: 6px; border: 1.5px dashed var(--border);
      background: transparent; border-radius: 8px; cursor: pointer;
      color: var(--text-muted); font-size: 11px; transition: all .15s; font-family: inherit;
    }
    .day-add-btn:hover { border-color: #9ca3af; color: var(--text); background: white; }

    /* ─── MONTHLY VIEW ───────────────── */
    .calendar-area.month-view {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 12px 20px;
    }
    .month-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .month-header-row {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px;
      flex-shrink: 0; margin-bottom: 4px;
    }
    .month-day-label {
      text-align: center; font-size: 10px; font-weight: 700; color: var(--text-muted);
      padding: 5px; text-transform: uppercase; letter-spacing: .06em;
    }
    .month-body { flex: 1; display: flex; flex-direction: column; gap: 3px; min-height: 0; }
    .week-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; flex: 1; min-height: 0; }
    .month-cell {
      background: white; border: 1px solid var(--border); border-radius: 8px;
      padding: 6px; cursor: pointer; transition: box-shadow .15s;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .month-cell:hover { box-shadow: var(--shadow); }
    .month-cell.today { border-color: var(--accent); border-width: 2px; }
    .month-cell.other-month { opacity: .18; pointer-events: none; }
    .month-cell-num { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; flex-shrink: 0; }
    .month-cell.today .month-cell-num { color: var(--accent); }
    .month-pill {
      font-size: 10px; padding: 2px 5px; border-radius: 4px; margin-bottom: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer;
      border-left: 2px solid var(--p-color, #ccc); background: var(--p-bg, #f5f5f5);
      color: var(--p-color, #666); font-weight: 500; display: block; flex-shrink: 0;
    }
    .month-more { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

    /* ─── PARTNER PANEL ──────────────── */
    .partner-panel {
      width: 290px; border-left: 1px solid var(--border);
      background: white; overflow-y: auto; flex-shrink: 0;
    }
    .partner-panel.hidden { display: none; }
    .partner-panel::-webkit-scrollbar { width: 4px; }
    .partner-panel::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 2px; }

    .pp-header {
      padding: 18px 18px 16px; position: sticky; top: 0; z-index: 2;
      display: flex; flex-direction: column; gap: 6px;
    }
    .pp-header-top { display: flex; align-items: flex-start; justify-content: space-between; }
    .pp-close {
      width: 24px; height: 24px; border: none; background: rgba(255,255,255,.22);
      border-radius: 50%; cursor: pointer; font-size: 12px;
      display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0;
    }
    .pp-type-badge {
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .09em;
      background: rgba(255,255,255,.2); color: white; padding: 2px 7px;
      border-radius: 100px; display: inline-block;
    }
    .pp-name { font-size: 20px; font-weight: 800; color: white; line-height: 1.1; }

    .pp-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .pp-section:last-child { border-bottom: none; }
    .pp-section-title {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .09em; color: var(--text-muted); margin-bottom: 10px;
    }
    .pp-empty { font-size: 11px; color: var(--text-muted); text-align: center; padding: 8px 0; font-style: italic; }

    /* Channels */
    .channels-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
    .channel-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 8px 4px; border-radius: 8px; border: 1.5px solid var(--border); opacity: .3;
    }
    .channel-item.on { border-color: var(--p-color); background: var(--p-bg); opacity: 1; }
    .channel-icon { font-size: 16px; }
    .channel-label { font-size: 8px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; text-align: center; }
    .channel-item.on .channel-label { color: var(--p-color); }
    .channel-extra {
      margin-top: 8px; font-size: 11px; color: var(--text-muted);
      background: var(--bg); border-radius: 6px; padding: 6px 9px; line-height: 1.5;
    }

    /* Contacts */
    .contact-item { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 9px; }
    .contact-item:last-child { margin-bottom: 0; }
    .contact-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white; flex-shrink: 0;
    }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-size: 12px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .contact-role { font-size: 10px; color: var(--text-muted); line-height: 1.3; }
    .contact-email { font-size: 10px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Solutions */
    .solution-item {
      display: flex; align-items: center; gap: 7px; padding: 5px 8px;
      border-radius: 6px; background: var(--bg); margin-bottom: 4px; font-size: 11px;
    }
    .solution-ruta {
      font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
      color: var(--p-color); background: var(--p-bg); padding: 2px 6px; border-radius: 4px; white-space: nowrap;
    }

    /* Week events in panel */
    .wei {
      display: flex; align-items: flex-start; gap: 7px; padding: 7px 9px;
      border-radius: 8px; background: var(--p-bg); border-left: 3px solid var(--p-color);
      margin-bottom: 5px; cursor: pointer;
    }
    .wei:hover { opacity: .8; }
    .wei-date { font-size: 10px; font-weight: 700; color: var(--text-muted); white-space: nowrap; min-width: 28px; }
    .wei-type { font-size: 10px; color: var(--text-muted); }
    .wei-title { font-size: 11px; font-weight: 500; }

    .pp-add-btn {
      width: 100%; padding: 6px; border: 1.5px dashed var(--border);
      background: transparent; border-radius: 8px; cursor: pointer;
      color: var(--text-muted); font-size: 11px; transition: all .15s;
      font-family: inherit; margin-top: 6px;
    }
    .pp-add-btn:hover { border-color: #9ca3af; color: var(--text); background: white; }

    /* ─── MODAL ──────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: white; border-radius: 16px; padding: 24px;
      width: 480px; max-width: 96vw; box-shadow: 0 24px 60px rgba(0,0,0,.2);
      max-height: 92vh; overflow-y: auto;
    }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; align-items: center; }
    .modal-cancel {
      padding: 8px 16px; border: 1.5px solid var(--border); background: white;
      border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 500; font-family: inherit;
    }
    .modal-save {
      padding: 8px 18px; background: var(--accent); color: white; border: none;
      border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit;
    }
    .modal-save:hover { opacity: .85; }
    .modal-delete {
      padding: 8px 12px; background: #FEE2E2; color: #DC2626; border: none;
      border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600;
      font-family: inherit; margin-right: auto;
    }

    .form-row { margin-bottom: 12px; }
    .form-row label {
      display: block; font-size: 10px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px;
    }
    .form-row input, .form-row select, .form-row textarea {
      width: 100%; padding: 8px 11px; border: 1.5px solid var(--border);
      border-radius: 8px; font-family: inherit; font-size: 13px; color: var(--text);
      outline: none; background: white; transition: border-color .15s;
    }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--accent); }
    .form-row textarea { resize: vertical; min-height: 65px; }
    .form-two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .partner-select-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; max-height: 180px; overflow-y: auto; }
    .pso {
      display: flex; align-items: center; gap: 7px; padding: 7px 9px;
      border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; transition: all .12s;
    }
    .pso.selected { border-color: var(--p-color); background: var(--p-bg); }
    .pso-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .pso-name { font-size: 11px; font-weight: 600; }
    .pso-type { font-size: 9px; color: var(--text-muted); }

    .type-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .type-chip {
      padding: 5px 11px; border: 1.5px solid var(--border); border-radius: 100px;
      cursor: pointer; font-size: 11px; font-weight: 500; transition: all .12s;
      font-family: inherit; background: white;
    }
    .type-chip.selected { border-color: var(--accent); background: var(--accent); color: white; }

    .hidden { display: none !important; }
    * { scrollbar-width: thin; scrollbar-color: #ddd transparent; }

    /* ─── LOCK SCREEN ─────────────────── */
    #lockScreen {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #0f1c4d 0%, #1a3a8f 50%, #4c1d8f 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .lock-card {
      background: white; border-radius: 20px;
      padding: 44px 40px; width: 360px; max-width: 90vw;
      text-align: center; box-shadow: 0 24px 60px rgba(0,0,0,.3);
    }
    .lock-logo {
      width: 52px; height: 52px; border-radius: 14px;
      background: linear-gradient(135deg, #1A237E 0%, #0051A5 50%, #7B2FBE 100%);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 800; font-size: 18px; letter-spacing: -0.5px;
      margin: 0 auto 16px;
    }
    .lock-title { font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 4px; }
    .lock-sub { font-size: 13px; color: #6B7280; margin-bottom: 28px; }
    .lock-input {
      width: 100%; border: 1.5px solid #E4E8F0; border-radius: 10px;
      padding: 11px 14px; font-size: 15px; font-family: inherit;
      outline: none; transition: border-color .15s; margin-bottom: 12px;
      text-align: center; letter-spacing: 2px;
    }
    .lock-input:focus { border-color: #2563EB; }
    .lock-input.shake {
      animation: shake .35s ease;
      border-color: #EF4444;
    }
    .lock-btn {
      width: 100%; background: linear-gradient(135deg, #1A237E, #2563EB);
      color: white; border: none; border-radius: 10px;
      padding: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: opacity .15s;
    }
    .lock-btn:hover { opacity: .9; }
    .lock-error {
      font-size: 12px; color: #EF4444; margin-top: 10px;
      min-height: 18px; transition: opacity .2s;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-6px)}
      40%{transform:translateX(6px)}
      60%{transform:translateX(-4px)}
      80%{transform:translateX(4px)}
    }
  </style>
</head>
<body>

<!-- ── LOCK SCREEN ───────────────────────────────── -->
<div id="lockScreen">
  <div class="lock-card">
    <div class="lock-logo">VP</div>
    <div class="lock-title">MKT Planner</div>
    <div class="lock-sub">Valor Pyme — S2 2026</div>
    <input id="lockInput" class="lock-input" type="password" placeholder="Clave de acceso" autocomplete="current-password">
    <button class="lock-btn" id="lockBtn">Ingresar</button>
    <div class="lock-error" id="lockError"></div>
  </div>
</div>

<header class="topbar">
  <div class="brand">
    <div class="brand-logo">VP</div>
    <div class="brand-text">
      <strong>Valor Pyme</strong>
      <span>MKT Planner</span>
    </div>
  </div>
  <div class="topbar-center">
    <button id="prevBtn" class="nav-btn">&#8592;</button>
    <span id="periodTitle" class="period-title"></span>
    <button id="nextBtn" class="nav-btn">&#8594;</button>
  </div>
  <div class="topbar-right">
    <div class="view-toggle">
      <button id="weekBtn" class="view-btn">Semanal</button>
      <button id="monthBtn" class="view-btn active">Mensual</button>
    </div>
    <button id="addEventBtn" class="add-btn">+ Agregar</button>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">Ver:</span>
  <button class="filter-pill active" data-id="all" style="border-color:#6B7280;color:#374151">Todos</button>
  <div class="filter-sep"></div>
  <span class="filter-label">Socios</span>
  <div id="filterSocios" style="display:contents"></div>
  <div class="filter-sep"></div>
  <span class="filter-label">Partners</span>
  <div id="filterPartners" style="display:contents"></div>
</div>

<div class="main-layout">
  <div class="calendar-area" id="calendarArea"></div>
  <aside class="partner-panel hidden" id="partnerPanel"></aside>
</div>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">Nueva acción</div>
    <input type="hidden" id="editId">
    <div class="form-row">
      <label>Socio / Partner</label>
      <div class="partner-select-grid" id="partnerSelectGrid"></div>
    </div>
    <div class="form-two">
      <div class="form-row">

const AUTH_KEY  = 'vp-auth-v1';
const APP_PASS  = 'valorpyme2026'; // ← cambia esta clave cuando quieras

(function initAuth(){
  const lock  = document.getElementById('lockScreen');
  const input = document.getElementById('lockInput');
  const btn   = document.getElementById('lockBtn');
  const err   = document.getElementById('lockError');

  if(localStorage.getItem(AUTH_KEY) === 'ok'){
    lock.style.display = 'none';
    return;
  }

  function tryUnlock(){
    if(input.value === APP_PASS){
      localStorage.setItem(AUTH_KEY,'ok');
      lock.style.display = 'none';
    } else {
      input.classList.remove('shake');
      void input.offsetWidth; // reflow para reiniciar animación
      input.classList.add('shake');
      err.textContent = 'Clave incorrecta, intenta de nuevo';
      input.value = '';
      input.focus();
      setTimeout(()=>{ input.classList.remove('shake'); err.textContent=''; }, 2000);
    }
  }

  btn.addEventListener('click', tryUnlock);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });
  input.focus();
})();

const dStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const isToday=d=>dStr(d)===dStr(today);
function fmtWeek(mon){
  const fri=addDays(mon,4);
  const fmt=d=>`${d.getDate()} ${MONTH_NAMES[d.getMonth()].slice(0,3)}`;
  return mon.getMonth()===fri.getMonth()
    ?`${mon.getDate()}–${fri.getDate()} ${MONTH_NAMES[mon.getMonth()]} ${mon.getFullYear()}`
    :`${fmt(mon)} – ${fmt(fri)} ${fri.getFullYear()}`;
}

      </div>`;
    }).join('');
    return`<div class="day-col">
      <div class="day-header">
        <div class="day-name">${DAY_NAMES[i]}</div>
        <div class="day-num-wrap ${isT?'today':''}"><div class="day-num">${date.getDate()}</div></div>
      </div>
      ${cards}
      <button class="day-add-btn" data-date="${ds}">+ Agregar</button>
    </div>`;
  }).join('');

  // Plan marks from Planif. General
  const planRaw=getWeekPlanPids(state.weekMonday);
  const planFiltered=state.filter==='all'?planRaw:planRaw.filter(p=>p===state.filter);
  const planBarHtml=planFiltered.length
    ?`<div class="plan-bar">
        <span class="plan-bar-label">Planif. General</span>
        ${planFiltered.map(pid=>{const p=PARTNERS[pid];return p?`<div class="plan-chip" style="--p-color:${p.color};--p-bg:${p.bg}"><div class="plan-chip-dot"></div>${p.name}</div>`:'';}).join('')}
      </div>`
    :'';

  area.innerHTML=summaryHtml+planBarHtml+`<div class="week-grid">${cols}</div>`;

  area.querySelectorAll('.event-card').forEach(card=>{
    card.addEventListener('click',()=>{
      const pid=card.dataset.partner; state.selectedPartnerId=pid; state.selectedEventId=card.dataset.id;
      document.querySelectorAll('.event-card').forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected'); renderPartnerPanel(pid);
    });
    card.addEventListener('dblclick',()=>openEditModal(card.dataset.id));
  });
  area.querySelectorAll('.day-add-btn').forEach(btn=>btn.addEventListener('click',()=>openModal(btn.dataset.date)));
}

// ═══════════════════════════════════════════════════
// MONTHLY VIEW
// ═══════════════════════════════════════════════════
function renderMonthly(){
  const area=document.getElementById('calendarArea');
  const {year,month}=state;
  const evs=loadEvents();

  // Lunes de la semana que contiene el día 1 del mes
  const firstOfMonth=new Date(year,month,1);
  const lastOfMonth=new Date(year,month+1,0);
  const startMon=getMonday(firstOfMonth);
  const endMon=getMonday(lastOfMonth);

  const headers=DAY_NAMES.map(d=>`<div class="month-day-label">${d}</div>`).join('');

  let rows='';
  let cur=new Date(startMon);

  while(cur<=endMon){
    let cells='';
    const weekMon=new Date(cur);
    const weekPlanPids=(()=>{const raw=getWeekPlanPids(weekMon);return state.filter==='all'?raw:raw.filter(p=>p===state.filter);})();

    for(let i=0;i<5;i++){
      const ds=dStr(cur);
      const isCurrentMonth=cur.getMonth()===month;
      const isT=ds===dStr(today);
      const dayEvs=evs.filter(e=>e.date===ds&&(state.filter==='all'||e.partnerId===state.filter));

      const pills=dayEvs.slice(0,3).map(ev=>{
        const p=PARTNERS[ev.partnerId];if(!p)return'';
        const et=EVENT_TYPES[ev.type]||{icon:'•'};
        return`<div class="month-pill" data-id="${ev.id}" data-partner="${ev.partnerId}" style="--p-color:${p.color};--p-bg:${p.bg}">${et.icon} ${esc(ev.title)}</div>`;
      }).join('');
      const more=dayEvs.length>3?`<div class="month-more">+${dayEvs.length-3} más</div>`:'';

      let planPills='';
      if(i===0 && isCurrentMonth && weekPlanPids.length){
        planPills=weekPlanPids.slice(0,4).map(pid=>{
          const p=PARTNERS[pid];if(!p)return'';
          return`<div class="month-pill month-pill-plan" style="--p-color:${p.color};--p-bg:${p.bg}">${p.name}</div>`;
        }).join('');
        if(weekPlanPids.length>4) planPills+=`<div class="month-more">+${weekPlanPids.length-4} planif.</div>`;
      }

      cells+=`<div class="month-cell ${isT?'today':''} ${!isCurrentMonth?'other-month':''}" data-date="${ds}">
        <div class="month-cell-num">${cur.getDate()}</div>${pills}${more}${planPills}
      </div>`;
      cur=addDays(cur,1);
    }
    cur=addDays(cur,2); // saltar fin de semana
    rows+=`<div class="week-row">${cells}</div>`;
  }

  area.innerHTML=`<div class="month-wrap">
    <div class="month-header-row">${headers}</div>
    <div class="month-body">${rows}</div>
  </div>`;

  area.querySelectorAll('.month-pill').forEach(pill=>{
    pill.addEventListener('click',e=>{e.stopPropagation();state.selectedPartnerId=pill.dataset.partner;renderPartnerPanel(pill.dataset.partner);});
    pill.addEventListener('dblclick',e=>{e.stopPropagation();openEditModal(pill.dataset.id);});
  });
  area.querySelectorAll('.month-cell').forEach(cell=>{
    cell.addEventListener('click',()=>{if(cell.dataset.date&&!cell.classList.contains('other-month'))openModal(cell.dataset.date);});
  });
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function updateTitle(){
  const el=document.getElementById('periodTitle');
  el.textContent=state.view==='week'?fmtWeek(state.weekMonday):`${MONTH_NAMES[state.month]} ${state.year}`;
}
function render(){
  updateTitle();
  const area=document.getElementById('calendarArea');
  if(state.view==='week'){
    area.classList.remove('month-view');
    renderWeekly();
  } else {
    area.classList.add('month-view');
    renderMonthly();
  }
  if(state.selectedPartnerId) renderPartnerPanel(state.selectedPartnerId);
}

// ═══════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════
function buildFilters(){
  document.getElementById('filterSocios').innerHTML=SOCIOS.map(p=>
    `<button class="filter-pill" data-id="${p.id}" style="border-color:${p.color};color:${p.color}">${p.name}</button>`).join('');
  document.getElementById('filterPartners').innerHTML=PLIST.map(p=>
    `<button class="filter-pill" data-id="${p.id}" style="border-color:${p.color};color:${p.color}">${p.name}</button>`).join('');

  document.querySelectorAll('.filter-pill').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.filter-pill').forEach(b=>{
        b.classList.remove('active'); b.style.background=''; b.style.color=b.style.borderColor||'#374151';
      });
      btn.classList.add('active');
      const id=btn.dataset.id;
      if(id==='all'){btn.style.background='#374151';btn.style.color='white';}
      else{const p=PARTNERS[id];btn.style.background=p.color;btn.style.color='white';}
      state.filter=id;
      if(id!=='all'){state.selectedPartnerId=id;renderPartnerPanel(id);}
      else{document.getElementById('partnerPanel').classList.add('hidden');state.selectedPartnerId=null;}
      render();
    });
  });
  const allBtn=document.querySelector('.filter-pill[data-id="all"]');
  if(allBtn){allBtn.style.background='#374151';allBtn.style.color='white';}
}

// ═══════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════
let _editId=null;

function buildPSG(selId){
  const g=document.getElementById('partnerSelectGrid');
  g.innerHTML=Object.values(PARTNERS).map(p=>`
    <div class="pso ${selId===p.id?'selected':''}" data-pid="${p.id}" style="--p-color:${p.color};--p-bg:${p.bg}">
      <div class="pso-dot" style="background:${p.color}"></div>
      <div><div class="pso-name">${p.name}</div><div class="pso-type">${p.type==='socio'?'Socio':'Partner'}</div></div>
    </div>`).join('');
  g.querySelectorAll('.pso').forEach(o=>o.addEventListener('click',()=>{
    g.querySelectorAll('.pso').forEach(x=>x.classList.remove('selected')); o.classList.add('selected');
  }));
}
function buildTC(sel){
  const w=document.getElementById('typeChips');
  w.innerHTML=Object.entries(EVENT_TYPES).map(([k,v])=>
    `<button class="type-chip ${sel===k?'selected':''}" data-type="${k}" type="button">${v.icon} ${v.label}</button>`).join('');
  w.querySelectorAll('.type-chip').forEach(b=>b.addEventListener('click',()=>{
    w.querySelectorAll('.type-chip').forEach(x=>x.classList.remove('selected')); b.classList.add('selected');
  }));
}
function openModal(defDate, defPid){
  _editId=null;
  document.getElementById('modalTitle').textContent='Nueva acción';
  document.getElementById('fieldDate').value=defDate||dStr(today);
  document.getElementById('fieldTitle').value='';
  document.getElementById('fieldDesc').value='';
  document.getElementById('deleteBtn').classList.add('hidden');
  buildPSG(defPid||state.selectedPartnerId||'');
  buildTC('reunion');
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function openEditModal(eid){
  const ev=loadEvents().find(e=>e.id===eid); if(!ev) return;
  _editId=eid;
  document.getElementById('modalTitle').textContent='Editar acción';
  document.getElementById('fieldDate').value=ev.date;
  document.getElementById('fieldTitle').value=ev.title;
  document.getElementById('fieldDesc').value=ev.description||'';
  document.getElementById('deleteBtn').classList.remove('hidden');
  buildPSG(ev.partnerId); buildTC(ev.type);
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function closeModal(){document.getElementById('modalOverlay').classList.add('hidden');}

// ═══════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════
function attachListeners(){
  document.getElementById('weekBtn').addEventListener('click',()=>{
    state.view='week';
    document.getElementById('weekBtn').classList.add('active');
    document.getElementById('monthBtn').classList.remove('active');
    render();
  });
  document.getElementById('monthBtn').addEventListener('click',()=>{
    state.view='month';
    document.getElementById('monthBtn').classList.add('active');
    document.getElementById('weekBtn').classList.remove('active');
    render();
  });
  document.getElementById('prevBtn').addEventListener('click',()=>{
    if(state.view==='week') state.weekMonday=addDays(state.weekMonday,-7);
    else{state.month--;if(state.month<0){state.month=11;state.year--;}}
    render();
  });
  document.getElementById('nextBtn').addEventListener('click',()=>{
    if(state.view==='week') state.weekMonday=addDays(state.weekMonday,7);
    else{state.month++;if(state.month>11){state.month=0;state.year++;}}
    render();
  });
  document.getElementById('addEventBtn').addEventListener('click',()=>openModal());
  document.getElementById('cancelBtn').addEventListener('click',closeModal);
  document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

  document.getElementById('saveBtn').addEventListener('click',()=>{
    const pid=document.querySelector('.pso.selected')?.dataset.pid;
    const type=document.querySelector('.type-chip.selected')?.dataset.type;
    const date=document.getElementById('fieldDate').value;
    const title=document.getElementById('fieldTitle').value.trim();
    const description=document.getElementById('fieldDesc').value.trim();
    if(!pid){alert('Selecciona un socio o partner.');return;}
    if(!type){alert('Selecciona un tipo de acción.');return;}
    if(!title){alert('Escribe un título.');return;}
    if(!date){alert('Selecciona una fecha.');return;}
    const ev={id:_editId||uid(),partnerId:pid,type,date,title,description,createdAt:new Date().toISOString()};
    addOrUpdate(ev);
    state.selectedPartnerId=pid;
    closeModal();
    render();
  });

  document.getElementById('deleteBtn').addEventListener('click',()=>{
    if(!_editId||!confirm('¿Eliminar esta acción?')) return;
    removeEvent(_editId); _editId=null; closeModal();
    state.selectedEventId=null; render();
  });
}
